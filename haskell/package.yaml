name: electrodynamics-simulations
version: 0.1.0.0
github: "GabrielMajeri/electrodynamics-simulations"
author: "Gabriel Majeri"

dependencies:
  - base >= 4.7 && < 5
  - random >= 1.3
  - bytestring >= 0.12
  - binary >= 0.8
  - floating-bits >= 0.3
  - MonadRandom >= 0.6
  - linear >= 1.23
  - deepseq >= 1.5
  - parallel >= 3.2
  - vector >= 0.13.2

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints
  - -optc=-march=native -optc-mtune=native
  # - -fllvm
  - -O

# Use GHC dialect, with custom extensions
language: GHC2024
default-extensions: DuplicateRecordFields

library:
  source-dirs: src

executables:
  electrodynamics-simulations-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N4
    dependencies:
      - electrodynamics-simulations
